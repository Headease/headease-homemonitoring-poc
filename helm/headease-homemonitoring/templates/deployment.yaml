apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "headease.fullname" . }}-fhir
  labels:
    {{- include "headease.labels" . | nindent 4 }}
    app.kubernetes.io/component: fhir
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "headease.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fhir
  template:
    metadata:
      labels:
        {{- include "headease.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fhir
    spec:
      containers:
        - name: fhir
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_MODULE
              value: "app.main_fhir:app"
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "headease.fullname" . }}-config
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.redis.enabled }}
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        {{- end }}
      volumes:
        - name: certs
          secret:
            secretName: {{ include "headease.certSecretName" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "headease.fullname" . }}-admin
  labels:
    {{- include "headease.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "headease.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        {{- include "headease.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin
    spec:
      containers:
        - name: admin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_MODULE
              value: "app.main_admin:app"
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "headease.fullname" . }}-config
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: certs
          secret:
            secretName: {{ include "headease.certSecretName" . }}
